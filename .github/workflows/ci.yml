name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: finance_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/finance_db
          REDIS_URL: redis://localhost:6379/0
        run: uv run alembic upgrade head

      - name: Lint with ruff
        run: uv run ruff check src

      - name: Type check with mypy
        run: uv run mypy src

      - name: Run tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/finance_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: test-key
          SECRET_KEY: test-secret
        run: uv run pytest tests/ -v --cov=src --cov-report=xml

  whatsapp-bridge-build:
    name: WhatsApp Bridge Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/whatsapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/whatsapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/server
          push: false
          tags: agent-finance-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build whatsapp bridge image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/whatsapp
          push: false
          tags: agent-finance-whatsapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
