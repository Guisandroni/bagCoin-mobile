    function MiniSparkline({ data, width=120, height=36, color }) {
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const points = data.map((v, i) => `${(i/(data.length-1))*width},${height - ((v-min)/range)*height}`).join(' ');
      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
          <defs><linearGradient id={`spark-${color?.replace('#','')?.replace(/[^a-z0-9]/gi,'')}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={typeof color === 'string' && color.startsWith('#') ? color : '#0052ff'} stopOpacity="0.2"/><stop offset="100%" stopColor={typeof color === 'string' && color.startsWith('#') ? color : '#0052ff'} stopOpacity="0"/></linearGradient></defs>
          <polyline points={points} fill="none" stroke={typeof color === 'string' && color.startsWith('#') ? color : '#0052ff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <polygon points={`0,${height} ${points} ${width},${height}`} fill={`url(#spark-${color?.replace('#','')?.replace(/[^a-z0-9]/gi,'')})`}/>
        </svg>
      );
    }

    function DonutChart({ segments, size=160, strokeWidth=18 }) {
      const radius = (size - strokeWidth) / 2;
      const circumference = 2 * Math.PI * radius;
      let offset = 0;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="var(--surface)" strokeWidth={strokeWidth}/>
          {segments.map((seg, i) => {
            const len = (seg.percent / 100) * circumference;
            const startOffset = offset;
            offset += len;
            return <circle key={i} cx={size/2} cy={size/2} r={radius} fill="none" stroke={seg.color} strokeWidth={strokeWidth} strokeDasharray={`${len} ${circumference - len}`} strokeDashoffset={-startOffset} transform={`rotate(-90 ${size/2} ${size/2})`} strokeLinecap="round" className="donut-segment"/>;
          })}
        </svg>
      );
    }

    function BarChart({ data, height=120 }) {
      const max = Math.max(...data.map(d => Math.abs(d.value)));
      return (
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: '6px', height }}>
          {data.map((d, i) => {
            const h = (Math.abs(d.value) / max) * 100;
            return (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: d.value >= 0 ? 'var(--success)' : 'var(--danger)', fontFamily: 'var(--font-mono)' }}>

                  <div style={{ background: d.color || 'var(--accent)', borderRadius: 4, height: '100%', minHeight: 4 }}/>
                </div>
                <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 600 }}>{d.label}</div>
              </div>
            );
          })}
        </div>
      );
    }

              <div className="topbar-actions">
                <button className="btn btn-primary btn-sm">+ Nova meta</button>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              <div data-od-id="goals-section">
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Metas</div>
                {goalCards}
              </div>
              <div data-od-id="budgets-section">
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Orcamentos — Abril 2026</div>
                {budgetCards}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function ReportsScreen({ variant }) {
      const isMobile = variant === 'mobile';
      const monthlyData = [
        { label: 'Nov', value: -4200, color: 'var(--danger)' },
        { label: 'Dez', value: -5600, color: 'var(--danger)' },
        { label: 'Jan', value: 800, color: 'var(--success)' },
        { label: 'Fev', value: 1400, color: 'var(--success)' },
        { label: 'Mar', value: -200, color: 'var(--danger)' },
        { label: 'Abr', value: 3220, color: 'var(--success)' },
      ];
      if (isMobile) return (
        <div style={{ padding: '0 20px 24px' }}>
          <div style={{ paddingTop: 48, paddingBottom: 16 }}>
            <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em' }}>Relatorios</div>
          </div>
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--muted)', marginBottom: 12 }}>Despesas por categoria — Abr</div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <DonutChart segments={[
                { percent: 38, color: '#ff6b35' },
                { percent: 22, color: '#7c3aed' },
                { percent: 15, color: '#0052ff' },
                { percent: 12, color: '#ffab00' },
                { percent: 8, color: '#00c853' },
                { percent: 5, color: '#e91e63' },
              ]} size={160} strokeWidth={14}/>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginTop: 12 }}>
              {[{n:'Alimentacao',v:'38%',c:'#ff6b35'},{n:'Moradia',v:'22%',c:'#7c3aed'},{n:'Transporte',v:'15%',c:'#0052ff'},{n:'Lazer',v:'12%',c:'#ffab00'},{n:'Saude',v:'8%',c:'#00c853'},{n:'Compras',v:'5%',c:'#e91e63'}].map((c,i)=>(
                <div key={i} style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                  <div style={{ width:8, height:8, borderRadius:'50%', background:c.c }}/><span style={{ fontWeight:500 }}>{c.n}</span>
                  <span style={{ color:'var(--muted)', fontFamily:'var(--font-mono)' }}>{c.v}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--muted)', marginBottom: 12 }}>Economia mensal</div>
            <BarChart data={monthlyData} height={100}/>
          </div>
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--muted)', marginBottom: 12 }}>Exportar relatorio</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-primary btn-sm" style={{ flex: 1 }}>Exportar PDF</button>
              <button className="btn btn-secondary btn-sm" style={{ flex: 1 }}>CSV</button>
            </div>
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '4px 0 8px' }}>Historico de relatorios</div>
          {MOCK_REPORTS.map(r => (
            <div key={r.id} className="card" style={{ marginBottom: 8, padding: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ width: 36, height: 36, borderRadius: 'var(--radius-sm)', background: 'var(--danger-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="var(--danger)" strokeWidth="1.5"><path d="M6 2h7l5 5v11a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M13 2v5h5"/><path d="M6 11h8M6 14h5M6 8h2"/></svg>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--muted)' }}>{r.period} · {r.date}</div>
                </div>
                <div style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>{r.size}</div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-secondary btn-sm" style={{ flex: 1, fontSize: 11 }}>Baixar</button>
                <button className="btn btn-secondary btn-sm" style={{ flex: 1, fontSize: 11 }}>Ver</button>
              </div>
            </div>
          ))}
        </div>
      );
      return (
        <div className="app-layout">
          <Sidebar activeId="reports"/>
          <main className="main-content" data-od-id="reports-screen">
            <div className="topbar">
              <h1>Relatorios</h1>
              <div className="topbar-actions">
                <button className="btn btn-secondary btn-sm">CSV</button>
                <button className="btn btn-primary btn-sm">Exportar PDF</button>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {['6 meses', '12 meses', 'Este ano', 'Personalizado'].map((p, i) => (
                <button key={p} className={`btn btn-sm ${i === 0 ? 'btn-primary' : 'btn-secondary'}`}>{p}</button>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 24 }}>
              <div className="card" data-od-id="report-donut">
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 20 }}>Despesas por categoria — Abr 2026</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
                  <DonutChart segments={[
                    { percent: 38, color: '#ff6b35' },
                    { percent: 22, color: '#7c3aed' },
                    { percent: 15, color: '#0052ff' },
                    { percent: 12, color: '#ffab00' },
                    { percent: 8, color: '#00c853' },
                    { percent: 5, color: '#e91e63' },
                  ]} size={180} strokeWidth={18}/>
                  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {[{n:'Alimentacao',v:'R$ 1.150',c:'#ff6b35'},{n:'Moradia',v:'R$ 2.200',c:'#7c3aed'},{n:'Transporte',v:'R$ 380',c:'#0052ff'},{n:'Lazer',v:'R$ 356',c:'#ffab00'},{n:'Saude',v:'R$ 89',c:'#00c853'},{n:'Compras',v:'R$ 155',c:'#e91e63'}].map((c,i)=>(
                      <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', fontSize:12 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:6 }}><div style={{ width:8, height:8, borderRadius:'50%', background:c.c }}/><span style={{ fontWeight:500 }}>{c.n}</span></div>
                        <span style={{ fontFamily:'var(--font-mono)', color:'var(--muted)' }}>{c.v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <div className="card" data-od-id="report-bars">
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 20 }}>Economia mensal</div>
                <BarChart data={monthlyData} height={160}/>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 12, textAlign: 'center' }}>Valores positivos = economia · Valores negativos = deficit</div>
              </div>
            </div>
            <div className="card" data-od-id="report-trend" style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 20 }}>Evolucao do saldo — ultimos 6 meses</div>
              <div style={{ height: 160, position: 'relative' }}>
                <svg width="100%" height="160" viewBox="0 0 600 160" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.15"/>
                      <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  {[0, 40, 80, 120].map(y => <line key={y} x1="0" y1={y} x2="600" y2={y} className="chart-grid"/>)}
                  <path d="M0,140 L100,120 L200,100 L300,80 L400,50 L500,30 L600,10" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  <path d="M0,140 L100,120 L200,100 L300,80 L400,50 L500,30 L600,10 L600,160 L0,160 Z" fill="url(#trendGrad)"/>
                </svg>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--muted)', marginTop: 4, fontFamily: 'var(--font-ui)' }}>
                  <span>Nov</span><span>Dez</span><span>Jan</span><span>Fev</span><span>Mar</span><span>Abr</span>
                </div>
              </div>
            </div>
            <div data-od-id="report-history">
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Historico de relatorios</div>
              <div className="card" style={{ padding: 0 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr 100px', padding: '12px 20px', borderBottom: '1px solid var(--border)', fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted)' }}>
                  <div>Relatorio</div><div>Periodo</div><div>Gerado em</div><div>Tamanho</div><div></div>
                </div>
                {MOCK_REPORTS.map(r => (
                  <div key={r.id} style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr 100px', padding: '14px 20px', borderBottom: '1px solid var(--border)', alignItems: 'center', fontSize: 13 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 32, height: 32, borderRadius: 'var(--radius-sm)', background: 'var(--danger-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="var(--danger)" strokeWidth="1.5"><path d="M6 2h7l5 5v11a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M13 2v5h5"/><path d="M6 11h8M6 14h5M6 8h2"/></svg>
                      </div>
                      <span style={{ fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</span>
                    </div>
                    <div style={{ color: 'var(--muted)' }}>{r.period}</div>
                    <div style={{ color: 'var(--muted)' }}>{r.date}</div>
                    <div style={{ color: 'var(--muted)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>{r.size}</div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button className="btn btn-secondary btn-sm" style={{ fontSize: 10, padding: '4px 10px' }}>Baixar</button>
                      <button className="btn btn-secondary btn-sm" style={{ fontSize: 10, padding: '4px 10px' }}>Ver</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function PendingScreen({ variant, onOpenDetail }) {
      const isMobile = variant === 'mobile';
      const pendingTxns = MOCK_TRANSACTIONS.filter(t => t.status === 'pending');
      const pendingItems = [
        ...pendingTxns,
        { id: 99, name: 'Mercado Livre — Fone de ouvido', category: 'Compras', amount: -149.90, date: '29 Abr', source: 'whatsapp', status: 'pending', note: 'Categoria nao definida automaticamente' },
      ];
      const renderItem = (t, compact) => (
        <div key={t.id} className="pending-card" style={{ marginBottom: isMobile || compact ? 8 : 12 }}>
          <div className="pending-source">
            <div className="whatsapp-icon">
              <svg viewBox="0 0 24 24" width="12" height="12"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347" fill="#fff"/></svg>
            </div>
            <span style={{ fontSize: 11, fontWeight: 600, color: '#25d366' }}>via WhatsApp</span>
            <span style={{ fontSize: 11, color: 'var(--muted)', marginLeft: 'auto' }}>{t.date}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{t.name}</div>
              <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{t.category} · {t.note || 'Aguardando confirmacao'}</div>
            </div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 600, letterSpacing: '-0.01em', color: 'var(--danger)' }}>{formatCurrency(t.amount)}</div>
          </div>
          {t.note && <div style={{ fontSize: 12, color: 'var(--warning)', fontWeight: 500, marginBottom: 8, padding: '6px 10px', background: 'var(--warning-soft)', borderRadius: 'var(--radius-sm)' }}>{t.note}</div>}
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-primary btn-sm" style={{ flex: 1 }}>Confirmar</button>
            <button className="btn btn-secondary btn-sm" style={{ flex: 1 }} onClick={() => onOpenDetail(t)}>Editar</button>
            <button className="btn btn-secondary btn-sm" style={{ color: 'var(--danger)', flex: 1 }}>Rejeitar</button>
          </div>
        </div>
      );
      if (isMobile) return (
        <div style={{ padding: '0 20px 24px' }}>
          <div style={{ paddingTop: 48, paddingBottom: 8 }}>
            <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em' }}>Pendencias</div>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>{pendingItems.length} itens aguardam sua confirmacao</div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
            <span className="badge badge-warning" style={{ fontSize: 12 }}>{pendingItems.length} pendentes</span>
          </div>
          {pendingItems.map(t => renderItem(t, true))}
        </div>
      );
      return (
        <div className="app-layout">
          <Sidebar activeId="pending"/>
          <main className="main-content" data-od-id="pending-screen">
            <div className="topbar">
              <div>
                <h1>Confirmacoes pendentes</h1>
                <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>{pendingItems.length} itens aguardam sua confirmacao via WhatsApp</div>
              </div>
              <div className="topbar-actions">
                <button className="btn btn-secondary btn-sm">Confirmar todas</button>
              </div>
            </div>
            <div style={{ maxWidth: 640 }}>
              {pendingItems.map(t => renderItem(t, false))}
            </div>
          </main>
        </div>
      );
    }

    const SCREEN_COMPONENTS = {
      dashboard: DashboardScreen,
      transactions: TransactionsScreen,
      budgets: BudgetsScreen,
      goals: GoalsScreen,
      reports: ReportsScreen,
      pending: PendingScreen,
    };

    function MobileNav({ active, onChange }) {
      const items = [
        { id: 'dashboard', label: 'Inicio', icon: 'home' },
        { id: 'transactions', label: 'Historico', icon: 'list' },
        { id: 'budgets', label: 'Orcamentos', icon: 'wallet' },
        { id: 'reports', label: 'Insights', icon: 'chart' },
        { id: 'pending', label: 'Pendencias', icon: 'bell' },
      ];
      return (
        <div className="mobile-bottom-nav">
          {items.map(item => (
            <div key={item.id} className={`nav-item ${active === item.id ? 'active' : ''}`} onClick={() => onChange(item.id)}>
              {NAV_ICONS[item.icon]}<span>{item.label}</span>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [activeScreen, setActiveScreen] = useState('dashboard');
      const [variant, setVariant] = useState('both');
      const [showNewTxModal, setShowNewTxModal] = useState(false);
      const [detailTx, setDetailTx] = useState(null);
      const [showFilterModal, setShowFilterModal] = useState(false);
      const [filterState, setFilterState] = useState({ type: 'all', categories: CATEGORIES.map(c => c.name) });

      const openNewTx = useCallback(() => setShowNewTxModal(true), []);
      const openDetail = useCallback((tx) => setDetailTx(tx), []);
      const closeDetail = useCallback(() => setDetailTx(null), []);
      const openFilter = useCallback(() => setShowFilterModal(true), []);
      const closeFilter = useCallback(() => setShowFilterModal(false), []);
      const applyFilter = useCallback((state) => setFilterState(state), []);

      const ScreenComponent = SCREEN_COMPONENTS[activeScreen];

      const screenProps = (screenId) => {
        const base = { variant };
        if (screenId === 'dashboard') return { ...base, onOpenNewTx: openNewTx };
        if (screenId === 'transactions') return { ...base, onOpenDetail: openDetail, onOpenFilter: openFilter, onOpenNewTx: openNewTx };
        if (screenId === 'pending') return { ...base, onOpenDetail: openDetail };
        return base;
      };

      return (
        <div className="prototype-shell">
          <nav className="screen-nav">
            <div className="brand"><BrandLogo/></div>
            {SCREENS.map(s => (
              <button key={s.id} className={`tab ${activeScreen === s.id ? 'active' : ''}`} onClick={() => setActiveScreen(s.id)}>
                {s.label}
              </button>
            ))}
            <div className="variant-toggle">
              <button className={variant === 'both' ? 'active' : ''} onClick={() => setVariant('both')}>Ambos</button>
              <button className={variant === 'desktop' ? 'active' : ''} onClick={() => setVariant('desktop')}>Desktop</button>
              <button className={variant === 'mobile' ? 'active' : ''} onClick={() => setVariant('mobile')}>Mobile</button>
            </div>
          </nav>
          <div className={`view-area ${variant === 'both' ? 'both' : variant === 'desktop' ? 'desktop-only' : 'mobile-only'}`}>
            {(variant === 'both' || variant === 'desktop') && (
              <div className="desktop-frame" key={`desktop-${activeScreen}`}>
                <ScreenComponent {...screenProps(activeScreen)} />
              </div>
            )}
            {(variant === 'both' || variant === 'mobile') && (
              <div className="mobile-frame">
                <div className="mobile-inner">
                  <div className="mobile-body">
                    <ScreenComponent {...screenProps(activeScreen)} />
                  </div>
                  <MobileNav active={activeScreen} onChange={setActiveScreen} />
                </div>
              </div>
            )}
          </div>
          {showNewTxModal && <NewTransactionModal onClose={() => setShowNewTxModal(false)} />}
          {detailTx && <TransactionDetailModal transaction={detailTx} onClose={closeDetail} />}
          {showFilterModal && <FilterModal onClose={closeFilter} onApply={applyFilter} initialType={filterState.type} initialCategories={filterState.categories} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
