</div>

<main class="flex-1 px-container-margin pt-stack-gap-md flex flex-col gap-stack-gap-lg">

<section class="flex bg-surface-container-low rounded-full p-1 relative shadow-sm">
<button class="flex-1 py-3 text-center rounded-full shadow-sm font-label-lg text-label-lg font-bold bg-white text-[#1b1c1e]">Meta de Economia</button>
<button class="flex-1 py-3 text-center rounded-full font-label-lg text-label-lg font-bold bg-[#1652F0] text-white shadow-sm">Orçamento de Gasto</button>
</section>
<!-- Form Container -->
<div class="bg-surface-container-lowest rounded-[24px] p-5 shadow-[0_2px_8px_rgba(0,0,0,0.04)] flex flex-col gap-stack-gap-lg">
<!-- Goal Banner Image -->
<!-- Goal Name -->
<div class="flex flex-col gap-stack-gap-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Nome do Objetivo</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: &quot;FILL&quot; 0;">edit</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-[#ECEFF3] border-none rounded-full font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-colors placeholder:text-outline-variant" placeholder="Ex: Viagem para o Japão" type="text">
</div>
</div>
<!-- Target Value -->
<div class="flex flex-col gap-stack-gap-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Valor Alvo</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: &quot;FILL&quot; 0;">attach_money</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-[#ECEFF3] border-none rounded-full font-headline-sm text-headline-sm text-on-surface focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-colors placeholder:text-outline-variant" placeholder="R$ 0,00" type="text">
</div>
</div>
<!-- Category Selector -->

<label class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Categoria</label>

<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-2xl bg-primary-fixed border-2 border-primary-container transition-transform active:scale-95">

<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: &quot;FILL&quot; 1;">flight_takeoff</span>
</div>
<span class="font-label-md text-label-md text-primary-container">Viagem</span>
</button>

<span class="material-symbols-outlined text-outline" style="font-variation-settings: &quot;FILL&quot; 0;">directions_car</span>
</div>

</button>
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-2xl bg-surface-container-low border-2 border-transparent hover:bg-surface-container-high transition-all active:scale-95">

<span class="material-symbols-outlined text-outline" style="font-variation-settings: &quot;FILL&quot; 0;">home</span>
</div>

</button>
