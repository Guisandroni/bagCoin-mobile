<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Relatórios Financeiros</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "tertiary-container": "#c60f1c",
                        "on-tertiary-container": "#ffd7d2",
                        "on-primary-container": "#dadfff",
                        "on-secondary-container": "#007352",
                        "surface-container-high": "#e9e7ea",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#0038b6",
                        "on-background": "#1b1c1e",
                        "primary-container": "#1652f0",
                        "surface-dim": "#dbd9dc",
                        "surface-tint": "#064ceb",
                        "on-tertiary-fixed-variant": "#93000f",
                        "on-surface-variant": "#434656",
                        "primary": "#003cc1",
                        "surface-container": "#efedf0",
                        "inverse-surface": "#303033",
                        "on-tertiary-fixed": "#410003",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdad6",
                        "primary-fixed": "#dde1ff",
                        "tertiary": "#9b0010",
                        "secondary": "#006c4d",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e3e2e5",
                        "on-surface": "#1b1c1e",
                        "on-secondary-fixed": "#002115",
                        "surface-container-highest": "#e3e2e5",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#40dfa8",
                        "error": "#ba1a1a",
                        "surface-bright": "#fbf9fb",
                        "on-primary-fixed": "#001452",
                        "on-secondary-fixed-variant": "#005139",
                        "surface": "#fbf9fb",
                        "primary-fixed-dim": "#b7c4ff",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f5f3f6",
                        "outline-variant": "#c3c5d8",
                        "inverse-on-surface": "#f2f0f3",
                        "outline": "#747687",
                        "background": "#fbf9fb",
                        "secondary-fixed": "#64fcc2",
                        "inverse-primary": "#b7c4ff",
                        "secondary-container": "#64fcc2"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-sm": "8px",
                        "stack-gap-md": "16px",
                        "stack-gap-lg": "24px",
                        "container-margin": "20px",
                        "inline-padding-md": "16px",
                        "inline-padding-lg": "32px"
                    },
                    "fontFamily": {
                        "label-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "display-lg": ["Manrope"],
                        "title-lg": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "display-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-md": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "title-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-16 pb-[104px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface dark:bg-background bg-surface-container-low dark:bg-surface-container-low transition-colors duration-200 active:scale-95">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant/50 dark:hover:bg-surface-variant/20 text-on-surface-variant dark:text-outline transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary dark:text-primary-fixed-dim">Financial Reports</h1>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant/50 dark:hover:bg-surface-variant/20 text-on-surface-variant dark:text-outline transition-colors">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="flex-1 px-container-margin py-stack-gap-lg flex flex-col gap-stack-gap-lg overflow-y-auto">
<!-- Filter Chips -->
<section>
<div class="flex gap-stack-gap-sm overflow-x-auto pb-2 scrollbar-hide -mx-container-margin px-container-margin">
<button class="px-6 py-3 rounded-full bg-primary-fixed-dim text-primary font-body-md text-body-md whitespace-nowrap transition-colors">
                    Monthly
                </button>
<button class="px-6 py-3 rounded-full bg-surface-container text-on-surface-variant font-body-md text-body-md whitespace-nowrap hover:bg-surface-variant transition-colors">
                    Taxes
                </button>
<button class="px-6 py-3 rounded-full bg-surface-container text-on-surface-variant font-body-md text-body-md whitespace-nowrap hover:bg-surface-variant transition-colors">
                    Yearly
                </button>
<button class="px-6 py-3 rounded-full bg-surface-container text-on-surface-variant font-body-md text-body-md whitespace-nowrap hover:bg-surface-variant transition-colors">
                    Custom
                </button>
</div>
</section>
<!-- Reports Grid -->
<section class="flex flex-col gap-stack-gap-md">
<!-- Report Card 1 -->
<article class="bg-surface-container-lowest rounded-lg p-5 flex flex-col gap-4 shadow-[0_4px_24px_rgba(22,82,240,0.06)] relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-5 rounded-bl-[100px] -z-0"></div>
<div class="flex justify-between items-start z-10">
<div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-1">Relatório Mensal - Abril</h2>
<p class="font-body-md text-body-md text-outline">Gerado em 01 Maio 2024</p>
</div>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-secondary-container/20 text-secondary font-label-md text-label-md gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
                        Concluído
                    </span>
</div>
<div class="mt-2 z-10">
<button class="w-full h-14 rounded-full bg-primary-container text-on-primary-container font-title-lg text-title-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="download">download</span>
                        Download PDF
                    </button>
</div>
</article>
<!-- Report Card 2 -->
<article class="bg-surface-container-lowest rounded-lg p-5 flex flex-col gap-4 shadow-[0_4px_24px_rgba(22,82,240,0.06)] relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-5 rounded-bl-[100px] -z-0"></div>
<div class="flex justify-between items-start z-10">
<div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-1">Declaração de IR 2023</h2>
<p class="font-body-md text-body-md text-outline">Gerado em 15 Abril 2024</p>
</div>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-secondary-container/20 text-secondary font-label-md text-label-md gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
                        Concluído
                    </span>
</div>
<div class="mt-2 z-10">
<button class="w-full h-14 rounded-full border border-primary text-primary font-title-lg text-title-lg flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="download">download</span>
                        Download PDF
                    </button>
</div>
</article>
<!-- Report Card 3 -->
<article class="bg-surface-container-lowest rounded-lg p-5 flex flex-col gap-4 shadow-[0_4px_24px_rgba(22,82,240,0.06)] relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-5 rounded-bl-[100px] -z-0"></div>
<div class="flex justify-between items-start z-10">
<div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-1">Relatório Anual 2023</h2>
<p class="font-body-md text-body-md text-outline">Gerado em 10 Jan 2024</p>
</div>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md gap-1">
<span class="material-symbols-outlined text-[14px]">history</span>
                        Arquivado
                    </span>
</div>
<div class="mt-2 z-10">
<button class="w-full h-14 rounded-full border border-primary text-primary font-title-lg text-title-lg flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="download">download</span>
                        Download PDF
                    </button>
</div>
</article>
</section>
<!-- Image Canvas Area for visual interest -->
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-container-margin py-stack-gap-sm pb-8 bg-surface-container-lowest dark:bg-surface-container-lowest shadow-sm md:hidden rounded-t-lg transition-all duration-300 ease-in-out">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-inline-padding-lg py-2 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all duration-300 ease-in-out active:scale-90 rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-inline-padding-lg py-2 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all duration-300 ease-in-out active:scale-90 rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-md text-label-md">Assets</span>
</button>
<!-- Active Tab -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-inline-padding-lg py-2 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all duration-300 ease-in-out active:scale-90">
<span class="material-symbols-outlined mb-1" data-icon="description" style="font-variation-settings: 'FILL' 1;">description</span>
<span class="font-label-md text-label-md">Reports</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-inline-padding-lg py-2 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all duration-300 ease-in-out active:scale-90 rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</button>
</nav>
</body></html>
