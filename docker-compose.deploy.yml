# =============================================================================
# Docker Compose for Azure Container Apps / Docker Hub
# =============================================================================
# This file uses pre-built images from Docker Hub.
#
# Before deploying:
# 1. Build and push images using: ./build-and-push.sh <your_dockerhub_user>
# 2. Replace YOUR_DOCKERHUB_USER below with your actual username
# 3. Create a .env file with all required secrets
#
# Deploy command:
#   docker compose -f docker-compose.deploy.yml up -d
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-finance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: whatsapp_sessions
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  server:
    image: ${DOCKERHUB_USER:-guisandroni}/bagcoin-server:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-finance_db}
      REDIS_URL: redis://redis:6379/0
      WHATSAPP_BRIDGE_URL: http://whatsapp:3002
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  worker:
    image: ${DOCKERHUB_USER:-guisandroni}/bagcoin-server:latest
    restart: always
    command: [".venv/bin/python", "-m", "celery", "-A", "src.celery_app", "worker", "--loglevel=info", "--pool=solo"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-finance_db}
      REDIS_URL: redis://redis:6379/0
      WHATSAPP_BRIDGE_URL: http://whatsapp:3002
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-secret}
    depends_on:
      - server
      - redis
      - db
    networks:
      - app_network

  whatsapp:
    image: ${DOCKERHUB_USER:-guisandroni}/bagcoin-whatsapp:latest
    restart: always
    environment:
      API_URL: http://server:8000
      MONGO_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongo:27017/whatsapp_sessions?authSource=admin
      PORT: 3002
    depends_on:
      mongo:
        condition: service_healthy
      server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network

  web:
    image: ${DOCKERHUB_USER:-guisandroni}/bagcoin-web:latest
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    depends_on:
      - server
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - web
      - whatsapp
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  app_network:
    driver: bridge
