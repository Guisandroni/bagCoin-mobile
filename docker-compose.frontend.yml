
# Standalone frontend configuration (all services together)
# Usage: docker-compose -f docker-compose.frontend.yml up -d
#
# This runs the complete BagCoin stack:
#   - Next.js frontend (port 3000)
#   - FastAPI backend (port 8000)
#   - PostgreSQL (port 5432)
#   - Redis (port 6379)
#   - Celery worker + beat + Flower (port 5555)
#
# Env vars: create apps/server/.env with required secrets

services:
  web:
    build:
      context: ./apps/web
      target: prod
    container_name: bagcoin_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=production
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: bagcoin_api_backend:dev
    container_name: bagcoin_api_backend
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - reports_data:/app/reports
    env_file:
      - ./apps/server/.env
    environment:
      - DEBUG=true
      - ENVIRONMENT=local
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-deepseek-v4-flash}
      - WHATSAPP_BRIDGE_URL=${WHATSAPP_BRIDGE_URL:-http://whatsapp-bridge:3001}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-bagcoin_webhook_secret_123}
      - API_KEY=${API_KEY:-bagcoin_webhook_secret_123}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bagcoin_api_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bagcoin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bagcoin123}
      - POSTGRES_DB=${POSTGRES_DB:-bagcoin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bagcoin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bagcoin_api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    image: bagcoin_api_backend:dev
    container_name: bagcoin_api_celery_worker
    volumes:
      - media_data:/app/media
      - reports_data:/app/reports
    command: celery -A app.worker.celery_app worker --loglevel=debug
    env_file:
      - ./apps/server/.env
    environment:
      - DEBUG=true
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@$$HOSTNAME 2>&1 | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  celery_beat:
    image: bagcoin_api_backend:dev
    container_name: bagcoin_api_celery_beat
    command: celery -A app.worker.celery_app beat --loglevel=debug
    env_file:
      - ./apps/server/.env
    environment:
      - DEBUG=true
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: bagcoin_api_backend:dev
    container_name: bagcoin_api_flower
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ./apps/server/.env
    environment:
      - DEBUG=true
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  whatsapp-bridge:
    build:
      context: ./apps/whatsapp-bridge
      dockerfile: Dockerfile
    image: bagcoin_whatsapp_bridge:dev
    container_name: bagcoin_whatsapp_bridge
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_data:/app/whatsapp-session
    environment:
      - FASTAPI_URL=http://app:8000/api/v1
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-bagcoin_webhook_secret_123}
      - PORT=3001
    restart: unless-stopped

  telegram-bridge:
    build:
      context: ./apps/telegram-bridge
      dockerfile: Dockerfile
    image: bagcoin_telegram_bridge:dev
    container_name: bagcoin_telegram_bridge
    environment:
      - BACKEND_URL=http://bagcoin_api_backend:8000
      - API_KEY=${API_KEY:-bagcoin_webhook_secret_123}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  media_data:
  postgres_data:
  redis_data:
  reports_data:
  whatsapp_data: