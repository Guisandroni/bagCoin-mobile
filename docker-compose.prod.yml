
# Production configuration
# with Traefik reverse proxy
# Frontend (Next.js) deployed on Vercel — only API services here.
#
# Usage:
#   1. Copy .env.prod.example to .env.prod and fill in values:
#      cp .env.prod.example .env.prod
#   2. Run: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Configure .env.prod with DOMAIN and ACME_EMAIL
#   2. Ensure ports 80 and 443 are available
#   3. Generate passwords: openssl rand -base64 32

services:
  traefik:
    image: traefik:v3.2
    container_name: bagcoin_api_traefik
    env_file:
      - .env.prod
    command:
      - "--api.dashboard=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Access logs
      - "--accesslog=true"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./deploy/traefik/usersfile:/etc/traefik/usersfile:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-public
    labels:
      # Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.bagcoin_api-traefik.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.bagcoin_api-traefik.entrypoints=websecure"
      - "traefik.http.routers.bagcoin_api-traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bagcoin_api-traefik.service=api@internal"
      - "traefik.http.routers.bagcoin_api-traefik.middlewares=bagcoin_api-auth"
      - "traefik.http.middlewares.bagcoin_api-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$xyz$$hash}"
      # Security headers middleware
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.bagcoin_api-security-headers.headers.frameDeny=true"
    restart: unless-stopped

  app:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: bagcoin_api_backend:prod
    pull_policy: build
    container_name: bagcoin_api_backend
    volumes:
      - media_data:/app/media
      - reports_data:/app/reports
    env_file:
      - .env.prod
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - INTERNAL_API_BASE_URL=http://app:8000
      - WHATSAPP_BRIDGE_URL=http://whatsapp-bridge:3001
      # Agent v2 toggles — override rápido via shell/env sem editar .env.prod.
      # Valores padrão vêm do env_file quando estas variáveis não estão setadas.
      - HUMANIZE_RESPONSES=${HUMANIZE_RESPONSES:-false}
      - ECHO_AUDIO_TRANSCRIPTION=${ECHO_AUDIO_TRANSCRIPTION:-false}
      - IMAGE_STRUCTURED_EXTRACT=${IMAGE_STRUCTURED_EXTRACT:-true}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - traefik-public
      - backend-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bagcoin_api-api.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.bagcoin_api-api.entrypoints=websecure"
      - "traefik.http.routers.bagcoin_api-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bagcoin_api-api.middlewares=bagcoin_api-security-headers@docker"
      - "traefik.http.services.bagcoin_api-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik-public"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bagcoin_api_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-bagcoin_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO external ports - only accessible within backend-internal network
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bagcoin_api_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # NO external ports - only accessible within backend-internal network
    volumes:
      - redis_data:/data
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: bagcoin_api_backend:prod
    pull_policy: build
    container_name: bagcoin_api_celery_worker
    healthcheck:
      disable: true
    volumes:
      - media_data:/app/media
      - reports_data:/app/reports
    command: celery -A app.worker.celery_app worker --loglevel=warning --concurrency=4
    env_file:
      - .env.prod
    environment:
      - DEBUG=false
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
      - egress
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: bagcoin_api_backend:prod
    pull_policy: build
    container_name: bagcoin_api_celery_beat
    healthcheck:
      disable: true
    command: celery -A app.worker.celery_app beat --loglevel=warning
    env_file:
      - .env.prod
    environment:
      - DEBUG=false
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: bagcoin_api_backend:prod
    pull_policy: build
    container_name: bagcoin_api_flower
    healthcheck:
      disable: true
    command: celery -A app.worker.celery_app flower --port=5555
    env_file:
      - .env.prod
    environment:
      - DEBUG=false
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    networks:
      - traefik-public
      - backend-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bagcoin_api-flower.rule=Host(`flower.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.bagcoin_api-flower.entrypoints=websecure"
      - "traefik.http.routers.bagcoin_api-flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.bagcoin_api-flower.loadbalancer.server.port=5555"
      - "traefik.docker.network=traefik-public"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  whatsapp-bridge:
    build:
      context: ./apps/whatsapp-bridge
      dockerfile: Dockerfile
    image: bagcoin_whatsapp_bridge:prod
    pull_policy: build
    container_name: bagcoin_whatsapp_bridge
    volumes:
      - whatsapp_data:/app/whatsapp-session
    env_file:
      - .env.prod
    environment:
      - FASTAPI_URL=http://app:8000/api/v1
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:?WHATSAPP_API_KEY is required}
      - PORT=3001
    networks:
      - backend-internal
      - egress
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  telegram-bridge:
    build:
      context: ./apps/telegram-bridge
      dockerfile: Dockerfile
    image: bagcoin_telegram_bridge:prod
    pull_policy: build
    container_name: bagcoin_telegram_bridge
    env_file:
      - .env.prod
    environment:
      - BACKEND_URL=http://app:8000
      - API_KEY=${API_KEY:?API_KEY is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    networks:
      - backend-internal
      - egress
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

networks:
  traefik-public:
    driver: bridge
  egress:
    driver: bridge
  backend-internal:
    driver: bridge
    internal: true

volumes:
  media_data:
  reports_data:
  whatsapp_data:
  traefik_letsencrypt:
  postgres_data:
  redis_data:
