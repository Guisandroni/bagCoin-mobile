services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: whatsapp_sessions
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  server:
    build:
      context: ./apps/server
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/finance_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://admin:password@mongo:27017/whatsapp_sessions?authSource=admin
      - WHATSAPP_BRIDGE_URL=http://whatsapp:3002
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app_network

  worker:
    build:
      context: ./apps/server
    restart: always
    command: [".venv/bin/python", "-m", "celery", "-A", "src.celery_app", "worker", "--loglevel=info", "--pool=solo"]
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/finance_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://admin:password@mongo:27017/whatsapp_sessions?authSource=admin
      - WHATSAPP_BRIDGE_URL=http://whatsapp:3002
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app_network

  whatsapp:
    build:
      context: ./apps/whatsapp
    restart: always
    environment:
      - MONGO_URL=mongodb://admin:password@mongo:27017/whatsapp_sessions?authSource=admin
      - API_URL=http://server:8000
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - app_network

  web:
    build:
      context: ./apps/web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  app_network:
    driver: bridge
