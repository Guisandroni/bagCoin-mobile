services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: whatsapp_sessions
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./apps/server
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/finance_db
      - WHATSAPP_BRIDGE_URL=http://whatsapp:3002
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./apps/server/.env
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./apps/server
    command: uv run celery -A src.celery_app worker --loglevel=info --concurrency=2
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/finance_db
      - WHATSAPP_BRIDGE_URL=http://whatsapp:3002
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./apps/server/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/server:/app

  web:
    build:
      context: ./apps/web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - server

  whatsapp:
    build:
      context: ./apps/whatsapp
    restart: always
    environment:
      - API_URL=http://server:8000
      - PORT=3002
      - MONGO_URL=mongodb://admin:password@mongo:27017/whatsapp_sessions?authSource=admin
    ports:
      - "3002:3002"
    depends_on:
      - server
      - mongo

volumes:
  postgres_data:
  redis_data:
  mongo_data:
