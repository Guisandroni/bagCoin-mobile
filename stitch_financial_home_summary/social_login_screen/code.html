<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6a",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto">
<!-- Top Navigation Area (iOS Status Bar Spacer) -->
<div class="h-12 w-full"></div>
<!-- Logo Section with Frosted Glass Minimalist Style -->
<div class="flex flex-col items-center justify-center pt-12 pb-8">
<div class="relative group">
<!-- Background Glow -->
<div class="absolute -inset-1 bg-primary/20 rounded-full blur-xl opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
<!-- Frosted Glass Logo Container -->
<div class="relative flex h-20 w-20 items-center justify-center rounded-full bg-white/60 dark:bg-white/10 glass-effect shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1, 'wght' 500;">
                        account_balance_wallet
                    </span>
</div>
</div>
</div>
<!-- Headline & Branding -->
<div class="px-8 text-center">
<h1 class="text-[#111814] dark:text-white tracking-tight text-[32px] font-extrabold leading-tight pb-2 pt-4">
                GreenFinance
            </h1>
<p class="text-[#4F5E55] dark:text-gray-400 text-lg font-medium leading-relaxed px-4">
                Sua vida financeira simplificada com Open Finance.
            </p>
</div>
<div class="flex-grow"></div>
<!-- Social Login Actions -->
<div class="flex flex-col gap-4 px-6 pb-12 w-full max-w-[480px] mx-auto">
<!-- Google Button -->
<button class="flex items-center justify-center gap-3 w-full h-[60px] rounded-full bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 shadow-sm active:scale-95 transition-transform duration-150">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[#111814] dark:text-white text-base font-bold tracking-tight">Continuar com Google</span>
</button>
<!-- Facebook Button -->
<button class="flex items-center justify-center gap-3 w-full h-[60px] rounded-full bg-[#1877F2] active:scale-95 transition-transform duration-150">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.01 1.79-4.67 4.53-4.67 1.31 0 2.68.23 2.68.23v2.95h-1.5c-1.49 0-1.96.93-1.96 1.87v2.25h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07z" fill="white"></path>
</svg>
<span class="text-white text-base font-bold tracking-tight">Continuar com Facebook</span>
</button>
</div>
<!-- Footer / Legal Disclaimer -->
<div class="px-8 pb-10 text-center">
<p class="text-[#8B9B92] dark:text-gray-500 text-xs font-medium leading-relaxed">
                Ao continuar, você concorda com nossos<br/>
<a class="text-primary dark:text-primary/80 underline underline-offset-2" href="#">Termos de Uso</a> e 
                <a class="text-primary dark:text-primary/80 underline underline-offset-2" href="#">Política de Privacidade</a>.
            </p>
</div>
<!-- iOS Home Indicator Space -->
<div class="h-6 w-full"></div>
</div>
</body></html>
